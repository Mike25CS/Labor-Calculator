<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Labor Margin Calculator</title>

<style>
body {
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:#0f172a;
  color:white;
  padding:16px;
}

.card {
  max-width:600px;
  margin:auto;
  background:#1e293b;
  padding:16px;
  border-radius:14px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  font-size:16px;
}

button {
  width:100%;
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  margin-bottom:14px;
}

.summary {
  font-size:18px;
  margin-bottom:12px;
}

.summary strong {
  display:block;
  margin-bottom:6px;
}

.ideal {
  opacity:.85;
  font-size:16px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  text-align:left;
}

tr:nth-child(even) {
  background:#111827;
}

.red { background:#7f1d1d; }
.orange { background:#7c2d12; }
.green { background:#065f46; }
</style>
</head>

<body>

<div class="card">
  <h2>Labor Margin Calculator</h2>

  <input id="price" type="number" placeholder="Selling Price" />
  <input id="materials" type="number" placeholder="Material Cost" />
  <button onclick="calculate()">Generate</button>

  <div id="summary" class="summary"></div>

  <table>
    <thead>
      <tr>
        <th>Margin %</th>
        <th>Max Labor</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
function formatMoney(val){
  return "$" + val.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
}

function calculate(){
  const price = parseFloat(document.getElementById("price").value);
  const materials = parseFloat(document.getElementById("materials").value);
  const tbody = document.getElementById("tableBody");
  const summary = document.getElementById("summary");

  if(!price || price <= 0) return;

  tbody.innerHTML = "";

  // 38% and 41% values
  const labor38 = (price * (1 - 0.38)) - materials;
  const labor41 = (price * (1 - 0.41)) - materials;

  summary.innerHTML = `
    <strong>Max Labor Allowed: ${formatMoney(labor38)}</strong>
    <div class="ideal">Ideal Labor Value (41%): ${formatMoney(labor41)}</div>
  `;

  for(let i=30;i<=50;i++){
    const gm = i/100;
    const labor = (price * (1 - gm)) - materials;

    let rowClass="";
    if(i>=30 && i<=34) rowClass="red";
    if(i>=35 && i<=37) rowClass="orange";
    if(i>=38 && i<=50) rowClass="green";

    const row = `
      <tr class="${rowClass}">
        <td>${i}%</td>
        <td>${formatMoney(labor)}</td>
      </tr>
    `;
    tbody.innerHTML += row;
  }
}
</script>

</body>
</html>
